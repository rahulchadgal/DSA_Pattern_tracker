services:
  - type: web
    name: dsa-tracker-api
    runtime: docker
    plan: free
    autoDeploy: true
    rootDir: backend
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
