services:
  - type: web
    name: dsa-tracker-api
    runtime: docker
    plan: free
    autoDeploy: true
    rootDir: backend-api
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_EXPIRATION_MS
        sync: false
      - key: FEATURE_AI_CLASSIFICATION
        value: false
      - key: FEATURE_EXCEL_IMPORT
        value: false
