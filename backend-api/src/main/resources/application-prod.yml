server:
  port: ${PORT:10000}
  address: 0.0.0.0

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}

app:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    com.dsatracker.backend: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level logger=%logger{36} requestId=%X{requestId:-na} msg=%msg%n"
