spring:
  application:
    name: dsa-tracker-backend
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:replace-with-very-long-random-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173,https://www.rahulchadgal.in,https://rahulchadgal.in,https://dsa-pattern-tracker-git-main-rahulchadgals-projects.vercel.app,https://dsa-pattern-tracker-oz3jjzlxp-rahulchadgals-projects.vercel.app}

feature:
  ai-classification-enabled: ${FEATURE_AI_CLASSIFICATION:false}
  excel-import-enabled: ${FEATURE_EXCEL_IMPORT:false}

logging:
  level:
    root: INFO
    com.dsatracker.backend: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level logger=%logger{36} requestId=%X{requestId:-na} msg=%msg%n"
